name: "[💡]: Feature request"
description: "Предложить новую функцию или улучшение."
title: "[💡]: "
projects: [ "savushkin-r-d/8" ]
type: "Feature"
assignees: KirillGutyrchik

body:
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Выберите приоритет задачи"
      options:
        - Low
        - Long-term plans
        - Medium
        - High
        - Critical
      default: Long-term plans
    validations:
      required: true
 
  - type: textarea
    id: feature_description
    validations: 
      required: true
    attributes:
      label: "Что бы вы хотели, чтобы было добавлено/изменено?"

  - type: textarea
    id: additional_info
    validations: 
      required: false
    attributes:
      label: "Дополнительная информация"
      description: "Добавьте дополнительную информацию или скриншоты о запросе здесь."


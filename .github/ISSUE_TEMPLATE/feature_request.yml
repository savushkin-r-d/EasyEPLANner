name: "[💡]: Feature request"
about: "Предложить новую функцию или улучшение."
title: "[💡]: "
labels: [ "Status: To Do", "Priority: Long-term plans" ]
projects: [ "savushkin-r-d/8" ]
type: "Feature"
assignees: KirillGutyrchik

body:
  - type: textarea
    id: feature_description
    validation: 
      required: true
    attributes:
      label: "Что бы вы хотели, чтобы было добавлено/изменено?"
      
  - type: textarea
    id: additional_info
    validation: 
      required: false
    attributes:
      label: "Дополнительная информация"
      description: "Добавьте дополнительную информацию или скриншоты о запросе здесь."


name: Sync issue priority to project

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  repository-projects: write
  contents: read

jobs:
  sync-priority:
    runs-on: ubuntu-latest

    steps:
      - name: Sync priority field
        uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          PRIORITY_FIELD_ID: ${{ secrets.PRIORITY_FIELD_ID }}
          PRIORITY_LOW_ID: ${{ secrets.PRIORITY_LOW_ID }}
          PRIORITY_MEDIUM_ID: ${{ secrets.PRIORITY_MEDIUM_ID }}
          PRIORITY_HIGH_ID: ${{ secrets.PRIORITY_HIGH_ID }}
          PRIORITY_CRITICAL_ID: ${{ secrets.PRIORITY_CRITICAL_ID }}
          PRIORITY_LONG_TERM_PLANS_ID: ${{ secrets.PRIORITY_LONG_TERM_PLANS_ID }}
          ITERATION_FIELD_ID: ${{ secrets.ITERATION_FIELD_ID }}
        with:
          github-token: ${{ secrets.AUTOMATISATION_PROJECT }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            const match = body.match(/### Priority\s+([\s\S]*?)(?:\n### |\s*$)/);
            if (!match) {
              core.info("Priority section not found");
              return;
            }

            const priority = match[1].trim();

            const optionByPriority = {
              Low: process.env.PRIORITY_LOW_ID,
              "Long-term plans": process.env.PRIORITY_LONG_TERM_PLANS_ID,
              Medium: process.env.PRIORITY_MEDIUM_ID,
              High: process.env.PRIORITY_HIGH_ID,
              Critical: process.env.PRIORITY_CRITICAL_ID,
            };

            const optionId = optionByPriority[priority];
            if (!optionId) {
              core.setFailed(`Unknown priority: ${priority}`);
              return;
            }

            // Parse desired completion date
            const dateMatch = body.match(/### Желаемая дата выполнения\s+([\d\-]+)/);
            const desiredDate = dateMatch ? dateMatch[1].trim() : null;

            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.PRIORITY_FIELD_ID;

            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId,
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }
            `, {
              projectId,
              contentId: issue.node_id,
            });

            const itemId = addResult.addProjectV2ItemById.item.id;

            // Update priority
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: {
                    singleSelectOptionId: $optionId
                  }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId,
              itemId,
              fieldId,
              optionId,
            });

            core.info(`Synced priority: ${priority}`);

            // Sync iteration if date is provided
            if (desiredDate && process.env.ITERATION_FIELD_ID) {
              const iterationFieldId = process.env.ITERATION_FIELD_ID;
              
              // Get all iterations from project
              const projectData = await github.graphql(`
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      field(name: "Iteration") {
                        ... on ProjectV2IterationField {
                          id
                          configuration {
                            iterations {
                              startDate
                              id
                              title
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                projectId,
              });

              const iterations = projectData.node?.field?.configuration?.iterations || [];
              let matchedIteration = null;

              for (const iteration of iterations) {
                if (iteration.startDate && desiredDate >= iteration.startDate) {
                  matchedIteration = iteration;
                  break;
                }
              }

              if (matchedIteration) {
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: {
                        iterationId: $iterationId
                      }
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `, {
                  projectId,
                  itemId,
                  fieldId: iterationFieldId,
                  iterationId: matchedIteration.id,
                });
                core.info(`Synced iteration: ${matchedIteration.title}`);
              } else {
                core.info(`No suitable iteration found for date: ${desiredDate}`);
              }
            }